name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  RELEASE_OWNER: ${{ vars.RELEASE_OWNER || github.repository_owner }}
  RELEASE_REPO: ${{ vars.RELEASE_REPO || github.event.repository.name }}
  SIGNPATH_SIGNING_POLICY_SLUG: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG || 'release-signing' }}
  SIGNPATH_WAIT_TIMEOUT_SECONDS: ${{ vars.SIGNPATH_WAIT_TIMEOUT_SECONDS || '3600' }}

jobs:
  build-macos:
    name: Build macOS release
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install npm deps
        run: npm install --legacy-peer-deps

      - name: Build and upload macOS bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN || github.token }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          owner: ${{ env.RELEASE_OWNER }}
          repo: ${{ env.RELEASE_REPO }}
          tagName: ${{ github.ref_name }}
          releaseName: "Atelier ${{ github.ref_name }}"
          releaseBody: |
            ## 변경 사항
            아래 자동 생성된 changelog 또는 직접 수정해주세요.

            <!-- changelog 자동 생성 영역 -->
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          args: "--target aarch64-apple-darwin"

  build-windows-unsigned:
    name: Build unsigned Windows bundle
    permissions:
      contents: read
    runs-on: windows-latest
    outputs:
      unsigned-artifact-id: ${{ steps.upload-unsigned-artifact.outputs.artifact-id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install npm deps
        run: npm install --legacy-peer-deps

      - name: Build unsigned Windows installers
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri -- build --ci

      - name: Collect unsigned Windows installers
        shell: pwsh
        run: .github/scripts/collect-windows-signpath-artifact.ps1

      - name: Upload unsigned artifact for SignPath
        id: upload-unsigned-artifact
        uses: actions/upload-artifact@v4
        with:
          name: atelier-windows-unsigned-${{ github.ref_name }}
          path: signpath-windows-unsigned
          if-no-files-found: error

  sign-windows:
    name: Sign Windows bundle with SignPath
    needs:
      - build-macos
      - build-windows-unsigned
    permissions:
      actions: read
      contents: write
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install npm deps
        run: npm install --legacy-peer-deps

      - name: Check SignPath configuration
        shell: pwsh
        env:
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
          SIGNPATH_ORGANIZATION_ID: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          SIGNPATH_PROJECT_SLUG: ${{ vars.SIGNPATH_PROJECT_SLUG }}
        run: |
          $required = @(
            "SIGNPATH_API_TOKEN",
            "SIGNPATH_ORGANIZATION_ID",
            "SIGNPATH_PROJECT_SLUG"
          )
          $missing = @()
          foreach ($name in $required) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              $missing += $name
            }
          }
          if ($missing.Count -gt 0) {
            throw "Missing SignPath repository value(s): $($missing -join ', ')"
          }

      - name: Submit SignPath signing request
        if: ${{ vars.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG == '' }}
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ env.SIGNPATH_SIGNING_POLICY_SLUG }}
          github-artifact-id: ${{ needs.build-windows-unsigned.outputs.unsigned-artifact-id }}
          github-token: ${{ github.token }}
          wait-for-completion: true
          wait-for-completion-timeout-in-seconds: ${{ env.SIGNPATH_WAIT_TIMEOUT_SECONDS }}
          output-artifact-directory: signed-windows
          parameters: |
            version: ${{ github.ref_name }}

      - name: Submit SignPath signing request with artifact configuration
        if: ${{ vars.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG != '' }}
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ env.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ vars.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}
          github-artifact-id: ${{ needs.build-windows-unsigned.outputs.unsigned-artifact-id }}
          github-token: ${{ github.token }}
          wait-for-completion: true
          wait-for-completion-timeout-in-seconds: ${{ env.SIGNPATH_WAIT_TIMEOUT_SECONDS }}
          output-artifact-directory: signed-windows
          parameters: |
            version: ${{ github.ref_name }}

      - name: Create updater signatures for signed Windows installers
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: .github/scripts/finalize-signpath-windows.ps1

      - name: Download existing updater JSON
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN || github.token }}
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          gh release download $env:GITHUB_REF_NAME `
            --repo "$env:RELEASE_OWNER/$env:RELEASE_REPO" `
            --pattern latest.json `
            --dir release-assets `
            --clobber 2>$null
          if ($LASTEXITCODE -ne 0) {
            '{"version":"","notes":"","pub_date":"","platforms":{}}' | Set-Content -Path release-assets/latest.json -Encoding UTF8
          }

      - name: Merge Windows entries into updater JSON
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: node .github/scripts/update-tauri-latest-json.mjs

      - name: Upload signed Windows assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN || github.token }}
        run: |
          $assets = @(Get-ChildItem -LiteralPath "release-assets/windows" -File | ForEach-Object { $_.FullName })
          $assets += "release-assets/latest.json"
          gh release upload $env:GITHUB_REF_NAME @assets `
            --repo "$env:RELEASE_OWNER/$env:RELEASE_REPO" `
            --clobber
