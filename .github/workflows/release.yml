name: Release

# 트리거: v* 태그 푸시 (예: v0.1.1)
on:
  push:
    tags:
      - "v*"
  # 수동 트리거도 허용 (Actions 탭에서)
  workflow_dispatch:

jobs:
  build-and-release:
    permissions:
      contents: write  # GitHub Release 생성/업로드
      id-token: write  # Azure OIDC 로그인
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
            arch_label: "macos-arm64"
          - platform: "windows-latest"
            args: "--config src-tauri/tauri.windows-signing.conf.json"
            arch_label: "windows-x64"

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Rust (with target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install npm deps
        run: npm install --legacy-peer-deps

      - name: Check Windows signing configuration
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID || secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID || secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID || secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ vars.AZURE_TRUSTED_SIGNING_ENDPOINT || secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          AZURE_TRUSTED_SIGNING_ACCOUNT_NAME: ${{ vars.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME || secrets.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
          AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME: ${{ vars.AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME || secrets.AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME }}
        run: |
          $required = @(
            "AZURE_CLIENT_ID",
            "AZURE_TENANT_ID",
            "AZURE_SUBSCRIPTION_ID",
            "AZURE_TRUSTED_SIGNING_ENDPOINT",
            "AZURE_TRUSTED_SIGNING_ACCOUNT_NAME",
            "AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME"
          )
          $missing = @()
          foreach ($name in $required) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              $missing += $name
            }
          }
          if ($missing.Count -gt 0) {
            throw "Missing repository signing value(s): $($missing -join ', ')"
          }

      - name: Azure login for Windows signing
        if: matrix.platform == 'windows-latest'
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID || secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID || secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID || secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build & sign Tauri bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ vars.AZURE_TRUSTED_SIGNING_ENDPOINT || secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          AZURE_TRUSTED_SIGNING_ACCOUNT_NAME: ${{ vars.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME || secrets.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
          AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME: ${{ vars.AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME || secrets.AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME }}
          AZURE_TRUSTED_SIGNING_DESCRIPTION: ${{ vars.AZURE_TRUSTED_SIGNING_DESCRIPTION || secrets.AZURE_TRUSTED_SIGNING_DESCRIPTION }}
          AZURE_TRUSTED_SIGNING_CLIENT_VERSION: ${{ vars.AZURE_TRUSTED_SIGNING_CLIENT_VERSION || secrets.AZURE_TRUSTED_SIGNING_CLIENT_VERSION }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Atelier ${{ github.ref_name }}"
          releaseBody: |
            ## 변경 사항
            아래 자동 생성된 changelog 또는 직접 수정해주세요.

            <!-- changelog 자동 생성 영역 -->
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true   # latest.json 자동 생성
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}
