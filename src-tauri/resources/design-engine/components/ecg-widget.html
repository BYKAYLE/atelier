<!--
  ECG Widget — 의료 도메인 시그니처 인라인 SVG.
  심전도 라인이 부드럽게 그려지는 애니메이션. hero 또는 feature 섹션에 사용.
  CSS-only animation (stroke-dashoffset).
-->
<div class="ecg" role="img" aria-label="실시간 심전도 모니터링 시각화">
  <div class="ecg__header">
    <div>
      <p class="ecg__eyebrow">LIVE</p>
      <p class="ecg__patient">환자 데이터 · ID 0247-A</p>
    </div>
    <div class="ecg__bpm">
      <strong>72</strong><span>BPM</span>
    </div>
  </div>
  <svg viewBox="0 0 800 200" preserveAspectRatio="none" class="ecg__svg" aria-hidden="true">
    <defs>
      <linearGradient id="ecgFade" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0" stop-color="#c96442" stop-opacity="0"></stop>
        <stop offset="0.15" stop-color="#c96442" stop-opacity="1"></stop>
        <stop offset="0.85" stop-color="#c96442" stop-opacity="1"></stop>
        <stop offset="1" stop-color="#c96442" stop-opacity="0"></stop>
      </linearGradient>
    </defs>
    <!-- baseline grid -->
    <g stroke="#e8e6df" stroke-width="1">
      <line x1="0" y1="50"  x2="800" y2="50"></line>
      <line x1="0" y1="100" x2="800" y2="100"></line>
      <line x1="0" y1="150" x2="800" y2="150"></line>
    </g>
    <!-- ECG path (one full cycle repeated) -->
    <path
      class="ecg__line"
      d="M 0 100 L 80 100 L 100 100 L 110 95 L 120 105 L 130 100 L 150 100 L 170 100 L 180 60 L 190 130 L 200 100 L 220 100 L 240 100 L 280 100 L 300 100 L 310 95 L 320 105 L 330 100 L 350 100 L 370 100 L 380 60 L 390 130 L 400 100 L 420 100 L 440 100 L 480 100 L 500 100 L 510 95 L 520 105 L 530 100 L 550 100 L 570 100 L 580 60 L 590 130 L 600 100 L 620 100 L 640 100 L 680 100 L 700 100 L 710 95 L 720 105 L 730 100 L 750 100 L 770 100 L 780 60 L 790 130 L 800 100"
      fill="none"
      stroke="url(#ecgFade)"
      stroke-width="2.5"
      stroke-linecap="round"
      stroke-linejoin="round">
    </path>
  </svg>
  <div class="ecg__footer">
    <span><span class="ecg__dot"></span> 정상 동율동</span>
    <span>±2.4ms 변동</span>
  </div>
</div>

<style>
  .ecg { background: #1f1f1d; color: #faf9f5; padding: 24px 32px; border-radius: 16px; box-shadow: 0 12px 32px rgba(31,31,29,0.18); max-width: 720px; }
  .ecg__header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
  .ecg__eyebrow { font: 700 11px/16px Pretendard, Inter, system-ui; letter-spacing: 0.16em; text-transform: uppercase; color: #c96442; margin: 0 0 4px; display: inline-flex; align-items: center; gap: 6px; }
  .ecg__eyebrow::before { content: ""; display: inline-block; width: 6px; height: 6px; border-radius: 999px; background: #c96442; animation: pulseLive 1.4s ease-in-out infinite; }
  .ecg__patient { font: 500 13px/20px Pretendard, system-ui; color: rgba(250,249,245,0.7); margin: 0; letter-spacing: 0.01em; }
  .ecg__bpm { text-align: right; }
  .ecg__bpm strong { font: 700 36px/40px Pretendard, Inter, system-ui; letter-spacing: -0.01em; color: #c96442; font-variant-numeric: tabular-nums; }
  .ecg__bpm span { display: inline-block; margin-left: 6px; font: 600 11px/16px Pretendard, Inter, system-ui; letter-spacing: 0.16em; color: rgba(250,249,245,0.6); text-transform: uppercase; }
  .ecg__svg { width: 100%; height: 160px; display: block; margin-bottom: 12px; }
  .ecg__line { stroke-dasharray: 2400; stroke-dashoffset: 2400; animation: ecgDraw 4s linear infinite; }
  .ecg__footer { display: flex; justify-content: space-between; font: 500 11px/16px Pretendard, Inter, system-ui; letter-spacing: 0.04em; color: rgba(250,249,245,0.6); }
  .ecg__dot { display: inline-block; width: 6px; height: 6px; border-radius: 999px; background: #6b8e6e; margin-right: 6px; vertical-align: middle; }
  @keyframes ecgDraw { 0% { stroke-dashoffset: 2400; } 100% { stroke-dashoffset: 0; } }
  @keyframes pulseLive { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.8); } }
</style>
